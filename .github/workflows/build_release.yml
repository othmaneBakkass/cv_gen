name: build_release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  builder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup go
        uses: actions/setup-go@v4
        with:
          go-version: "1.25"

      - name: Build binary
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/cv_gen main.go
          GOOS=darwin GOARCH=amd64 go build -o dist/cv_gen_darwin main.go
          GOOS=windows GOARCH=amd64 go build -o dist/cv_gen.exe main.go

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
